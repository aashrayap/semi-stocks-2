key_risks:
  - "Debt/equity 6.4x — heavily leveraged. Interest expense already $388M/quarter."
  - "Customer concentration: Microsoft 62% of 2024 revenue. OpenAI and Meta contracts massive but concentrated."
  - "Capex $30-35B in 2026 vs $12-13B revenue — spending $2.60 per $1 revenue. FCF deeply negative."
  - "GPU depreciation: current fleet (H100, A100) will depreciate as Blackwell/Rubin ramp."
  - "Q1 guide missed consensus by $300M+ — execution risk in ramp timing."
  - "NVIDIA dependency: single supplier for core product. Exemplar status = advantage but also lock-in."
