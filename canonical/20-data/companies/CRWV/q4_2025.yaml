business:
  summary: >
    CoreWeave sells GPU cloud capacity, managed AI infrastructure, storage, and software services.
    In this repo it is the clearest downstream demand expression: when CoreWeave expands backlog,
    power, and capex, that demand propagates backward into NVIDIA, memory, optics, and data-center buildout.
  key_products:
    - "GPU cloud / reserved instances"
    - "GB200 and future Rubin AI clusters"
    - "CoreWeave storage and cloud software stack"
    - "mission-control / orchestration software"
    - "AI data-center capacity"

thesis_relevance:
  bottleneck_role: >
    Primary read-through on downstream AI infrastructure demand. CoreWeave is not the upstream bottleneck
    itself; it is the proof that GPU cloud demand is strong enough to keep pulling on chips, memory,
    optics, and power simultaneously.
  why_now: >
    Q4 2025 revenue reached $1.57B, backlog expanded to $66.8B, management said it still could not catch
    up with demand, and virtually all 2026 capacity was already allocated. That makes CoreWeave the
    strongest current demand validator in the repo.
  confirms_next:
    - "Q1 2026 revenue lands inside the $1.9B-$2.0B guide and operating income avoids a deeper trough."
    - "Backlog, power capacity, or reserved-instance commentary keeps moving up rather than flattening."
    - "Rubin deployment timing and lower financing costs show up as visible execution progress in 2026."
  break_conditions:
    - "Customer demand or backlog conversion weakens enough to expose the leverage."
    - "Interest expense and capex stay so high that scale fails to turn into margin."
    - "GPU availability improves while CoreWeave still cannot earn through the balance sheet."

