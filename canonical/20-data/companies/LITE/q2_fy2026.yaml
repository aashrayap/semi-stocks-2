business:
  summary: >
    Lumentum sells optical components and systems used in AI data-center interconnects, including
    lasers, modules, optical circuit switches, and CPO-related photonics. It is both a current scale-out
    optics beneficiary and a future CPO option.
  key_products:
    - "AI optical components"
    - "optical circuit switches (R300, R64)"
    - "advanced laser components"
    - "co-packaged optics platforms"

thesis_relevance:
  bottleneck_role: >
    Direct expression of AI scale-out optics demand today with visible optionality into scale-up / CPO.
    Lumentum now monetizes both components and systems rather than only long-dated architecture hopes.
  why_now: >
    Q2 FY2026 revenue grew 65.5% YoY, Q3 guide implies another major step up, OCS backlog is above
    $400M, CPO already has a multi-hundred-million-dollar order for 1H 2027 delivery, and NVIDIA
    committed both capital and future purchase rights in March 2026.
  confirms_next:
    - "Q3 FY2026 hits the $780M-$830M guide with 30%-31% non-GAAP operating margin."
    - "OCS backlog converts into systems revenue rather than remaining pipeline."
    - "CPO orders and NVIDIA partnership show up in capacity or shipment commentary through 2026-2027."
  break_conditions:
    - "Optical demand is concentrated and customers pause orders after the first AI buildout wave."
    - "OCS backlog slips or gets pushed out."
    - "CPO remains real but too delayed to support valuation."

