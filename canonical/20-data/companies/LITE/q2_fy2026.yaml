thesis_signals:
  - bottleneck: pluggable_optics
    direction: confirms
    evidence: >
      Revenue rose 65.5% YoY, components were 66.7% of total revenue, and Q3 guide points to another
      major step up, showing AI optical demand is already moving the reported P&L.
    source_ref: earnings_release

  - bottleneck: pluggable_optics
    direction: confirms
    evidence: >
      OCS backlog is already above $400M, and the R64 OCS extends Lumentum's optical-circuit-switch
      lineup into lower-port-count AI deployments with 72x72 scaling and major power savings.
    source_ref: earnings_release

  - bottleneck: cpo_next
    direction: confirms
    evidence: >
      Management disclosed an incremental multi-hundred-million-dollar CPO order for 1H 2027 delivery,
      while NVIDIA added a $2B investment, a multibillion purchase commitment, and future capacity rights
      for advanced laser components.
