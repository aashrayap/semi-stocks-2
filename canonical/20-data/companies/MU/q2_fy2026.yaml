business:
  summary: >
    Micron sells DRAM, HBM, NAND, and data-center SSDs. In the AI stack it is the direct memory
    bottleneck expression: the company monetizes both HBM content growth inside accelerators and
    rising DRAM/NAND intensity in AI servers and storage tiers.
  key_products:
    - "HBM4 and HBM4E"
    - "1-gamma DRAM"
    - "G9 NAND"
    - "LP DRAM for data center platforms"
    - "high-capacity data-center SSDs"

thesis_relevance:
  bottleneck_role: >
    Pure memory supercycle exposure. Micron is where AI demand shows up as higher bits per system,
    tighter supply, stronger pricing, and aggressive cleanroom / packaging capex.
  why_now: >
    The quarter set records across revenue, gross margin, EPS, and free cash flow, while management
    explicitly said DRAM and NAND should remain supply constrained beyond calendar 2026.
    HBM4 volume shipments for NVIDIA Vera Rubin connect the memory thesis directly to the 2026 GPU ramp.
  confirms_next:
    - "Q3 FY2026 prints near the $33.5B guide with gross margin around 81%."
    - "HBM4/HBM4E ramp commentary stays constructive and supply remains tight."
    - "Industry tightness persists even as capex rises and cleanroom construction accelerates."
  break_conditions:
    - "Pricing weakens faster than expected as supply additions arrive."
    - "HBM share or yield execution slips versus peers."
    - "Customer digestion or over-ordering causes margin compression before 2027."

