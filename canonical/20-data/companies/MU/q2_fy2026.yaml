thesis_signals:
  - bottleneck: memory
    direction: confirms
    evidence: >
      Management said DRAM and NAND data-center bit TAM should exceed 50% of industry TAM in 2026
      and that both AI and traditional server demand are constrained by inadequate supply.
    source_ref: prepared_remarks

  - bottleneck: memory
    direction: confirms
    evidence: >
      Record Q2 results with 74.9% non-GAAP gross margin and a Q3 guide of $33.5B revenue / ~81%
      gross margin show the shortage is converting directly into pricing and earnings power.
    source_ref: earnings_release

  - bottleneck: memory
    direction: confirms
    evidence: >
      Micron has begun HBM4 volume shipments for NVIDIA Vera Rubin and is investing above $25B
      in FY2026 capex, reinforcing that memory capacity is being pulled hard by the 2026 accelerator ramp.
    source_ref: prepared_remarks

