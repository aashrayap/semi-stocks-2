business:
  summary: >
    NVIDIA sells accelerated-computing platforms spanning GPUs, CPUs, networking, and software.
    In this repo it is the central demand engine: every Blackwell and Rubin system pulls on TSMC wafers,
    HBM supply, optical interconnect, and GPU-cloud deployment.
  key_products:
    - "Blackwell and Rubin accelerator platforms"
    - "NVLink / rack-scale systems"
    - "Spectrum-X and Quantum networking"
    - "CUDA and inference software stack"
    - "Grace / Vera CPU platforms"

thesis_relevance:
  bottleneck_role: >
    Core consumer and monetizer of the active semiconductor bottlenecks. NVIDIA does not just benefit
    from scarcity; its own roadmap and shipment volume are what make N3, memory, and optics binding.
  why_now: >
    Q4 FY2026 printed $68.1B revenue, $11B of networking revenue, and $95.2B of supply commitments,
    while management guided another step up to $78B in Q1 and pushed Rubin production into H2 2026.
    That combination keeps NVIDIA at the center of the current cascade.
  confirms_next:
    - "Q1 FY2027 reaches the $78B +/-2% guide with margins still in the mid-70s."
    - "Rubin production timing, supply commitments, and networking growth stay on track through 2026."
    - "Inventory and customer backlog keep supporting the $500B visibility claim."
  break_conditions:
    - "Rubin slips or Blackwell-to-Rubin transitions slow enough to weaken supply pressure."
    - "Networking growth stalls, undermining the optics read-through."
    - "China restrictions or competitor catch-up force margin compression before FY2027."

