thesis_signals:
  - bottleneck: n3_logic
    direction: confirms
    evidence: >
      Rubin moving to N3, competing with TPU v7/v8, Trainium3, MI350X for TSMC capacity.
      $95.2B supply commitments (nearly doubled QoQ) = enormous wafer demand.
      Vera Rubin production H2 2026 adds further N3 pressure.
      Six new chips this cycle — all need N3.
    source_ref: earnings_event

  - bottleneck: memory
    direction: confirms
    evidence: >
      $21.4B inventory (significant HBM stockpile).
      Every GPU shipped needs HBM. NVIDIA GPU volumes are primary demand driver for memory supercycle.
      CRWV alone ordering $30-35B capex worth of GPUs = massive HBM pull-through.
    source_ref: earnings_event

  - bottleneck: pluggable_optics
    direction: confirms
    evidence: >
      Networking revenue $11B (+3.5x YoY). Every NVL72 rack uses OSFP pluggable transceivers.
      Spectrum-X "a home run." "We ship racks of computers" = optics in every unit.
      Grace Blackwell = ~2/3 of DC revenue — all rack-scale with optics.
    source_ref: earnings_event

  - bottleneck: gpu_cloud
    direction: confirms
    evidence: >
      Supply commitments doubled ($50.3B → $95.2B). $500B revenue visibility.
      Demand "growing exponentially." Validates CRWV thesis — NVIDIA can't build fast enough.
    source_ref: earnings_event

positioning:
  baker:
    ticker: NVDA
    value: 1_000_000_000  # $1B+ (massive long)
    type: common
    conviction: very_high
    thesis: "Semiconductor supply chain is the bottleneck. NVDA = picks and shovels."

  leopold:
    ticker: NVDA
    value: 0
    type: exited
    conviction: negative
    thesis: "Rotated out of NVDA into GPU cloud (CRWV #1) and power/optics. Bets downstream deployment layer."

  divergence: >
    Clearest thesis disagreement between Baker and Leopold.
    Baker: semiconductor supply chain bottleneck → NVDA is THE play ($1B+).
    Leopold: exited NVDA, concentrated into CRWV (calls, #1 position), LITE, power names.
    Baker bets the chip layer. Leopold bets the deployment layer.
    Both can be right (different time horizons) but positioning is diametrically opposite.

