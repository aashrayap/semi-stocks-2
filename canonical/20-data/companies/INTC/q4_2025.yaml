thesis_signals:
  - bottleneck: n3_logic
    direction: confirms
    evidence: >
      Intel said AI-driven demand created meaningful supply constraints, DCAI revenue rose 15%
      sequentially, and revenue would have been materially higher with more supply.
    source_ref: prepared_remarks

  - bottleneck: n3_logic
    direction: contradicts
    evidence: >
      Intel Foundry is ramping 18A, raising EUV wafer mix, and engaging external customers on 14A,
      which is precisely the kind of alternative leading-edge supply response that could ease the crunch later.
    source_ref: prepared_remarks

  - bottleneck: memory
    direction: confirms
    evidence: >
      Intel flagged rising DRAM, NAND, and substrate pricing due to intense AI infrastructure demand,
      showing upstream component constraints are now feeding through into Intel's model.
    source_ref: prepared_remarks

