business:
  summary: >
    Intel sells CPUs, AI PCs, server processors, foundry services, and advanced packaging.
    In this repo the stock matters less as a current earnings machine and more as a swing factor in
    whether leading-edge U.S. wafer supply and packaging alternatives can emerge behind TSMC.
  key_products:
    - "Xeon server CPUs"
    - "Core Ultra Series 3 / Panther Lake on Intel 18A"
    - "Intel Foundry EUV wafers"
    - "EMIB and advanced packaging services"
    - "future 14A process platform"

thesis_relevance:
  bottleneck_role: >
    Potential alternative supply source for leading-edge logic and advanced packaging.
    Intel can both validate current scarcity and eventually soften it if 18A/14A ramp well.
  why_now: >
    Intel said AI-driven demand materially outstripped available supply, DCAI had its fastest sequential
    growth of the decade, and Foundry revenue rose on EUV mix. At the same time, 18A and 14A
    milestones mean the company is trying to become a real future supply response.
  confirms_next:
    - "Q1/Q2 2026 supply actually improves and DCAI remains strong."
    - "Intel Foundry posts the promised double-digit Q1 QoQ growth."
    - "External 14A customer decisions begin landing in H2 2026."
  break_conditions:
    - "18A yield improvements stall and foundry losses widen further."
    - "Server demand shifts to competitors faster than Intel can supply."
    - "Capex discipline prevents Intel from building enough capacity to matter."

