thesis_signals:
  - bottleneck: pluggable_optics
    direction: confirms
    evidence: >
      Datacenter and communications was 72% of Q2 revenue ($1.208B) and management tied
      H2 FY2026 and FY2027 growth to continued datacenter demand plus production capacity expansion.
    source_ref: earnings_release

  - bottleneck: pluggable_optics
    direction: confirms
    evidence: >
      Q3 guide calls for $1.70B-$1.84B revenue and 38.5%-40.5% non-GAAP gross margin,
      implying AI-optics demand is supporting both growth and pricing/mix.
    source_ref: earnings_release

  - bottleneck: cpo_next
    direction: confirms
    evidence: >
      March 2026 NVIDIA partnership added a multibillion-dollar purchase commitment, future
      capacity rights for advanced laser and optical networking products, and a $2B NVIDIA investment
      to expand Coherent's U.S. manufacturing and R&D base.
    source_ref: nvidia_partnership

  - bottleneck: cpo_next
    direction: confirms
    evidence: >
      OFC 2026 demos included 6.4T socketed silicon-photonics CPO, VCSEL-based socketed CPO,
      and a 400G-per-lane InP-on-silicon modulator path, showing Coherent has multiple technical
      routes into future package-level optics.
    source_ref: ofc_2026_cpo_release

