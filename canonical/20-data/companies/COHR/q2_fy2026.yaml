business:
  summary: >
    Coherent sells the optical building blocks that show up in AI interconnects: lasers, optical
    modules, transceivers, silicon photonics components, and advanced photonic packaging.
    The company is no longer an "industrial laser only" story; datacenter and communications is
    now the dominant segment.
  key_products:
    - "800G and 1.6T optical modules / transceivers"
    - "external laser source modules"
    - "indium phosphide lasers and modulators"
    - "VCSEL-based optical engines"
    - "silicon photonics and CPO building blocks"

thesis_relevance:
  bottleneck_role: >
    Current pluggable-optics revenue play with credible optionality into co-packaged optics.
    Coherent supplies lasers, optical engines, and packaging technologies needed for AI scale-out
    links today and higher-density optical architectures tomorrow.
  why_now: >
    Datacenter and communications was 72% of Q2 revenue, management guided another up-quarter,
    and March 2026 artifacts show direct NVIDIA capacity commitments plus OFC demos across
    6.4T CPO, 400G-per-lane InP modulation, and 1.6T/XPO-related platforms.
  confirms_next:
    - "Q3 FY2026 lands inside or above the $1.70B-$1.84B revenue guide."
    - "Datacenter and communications remains the dominant segment with margins staying near 40%."
    - "NVIDIA capacity commitments and new AI optics programs show up in backlog or shipment commentary."
  break_conditions:
    - "Datacenter and communications growth slows sharply or loses mix share."
    - "Capacity expansion fails to convert into revenue or gross margin."
    - "CPO stays experimental without visible program revenue moving toward 2027."

