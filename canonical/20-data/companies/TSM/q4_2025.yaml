thesis_signals:
  - bottleneck: n3_logic
    direction: confirms
    evidence: >
      Q4 revenue reached $33.73B with gross margin 62.3%, and management said both Q4 and Q1 2026
      were supported by strong demand for leading-edge process technologies.
    source_ref: press_release_ex_99_1

  - bottleneck: n3_logic
    direction: confirms
    evidence: >
      3nm already accounted for 28% of wafer revenue, and 7nm-and-below advanced nodes were 77%
      of total wafer revenue, showing AI demand remains concentrated in constrained leading-edge supply.
    source_ref: press_release_ex_99_1

  - bottleneck: n3_logic
    direction: contradicts
    evidence: >
      A 2026 capital budget of $52B-$56B is a real supply response. It does not break the shortage today,
      but it is exactly the kind of capex that can eventually ease logic tightness.
    source_ref: press_release_ex_99_1

