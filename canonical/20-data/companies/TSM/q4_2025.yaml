  baker:
    ticker: TSM
    value: 0
    type: no_direct_position
    conviction: indirect
    notes: "Exposure is embedded via NVDA and other semiconductor supply-chain longs rather than direct TSM ownership."

  divergence: >
    There is no direct 13F divergence because neither fund owns TSM. The real read-through is that both
    rely on TSM capacity, but both prefer more leveraged downstream expressions of the same bottleneck.

key_risks:
  - "TSMC is foundational but less trade-expressive than second-order beneficiaries."
  - "Massive capex is both a strength and the eventual mechanism that relieves the bottleneck."
  - "Node mix and margins are strong now, but any demand digestion would be felt quickly."
