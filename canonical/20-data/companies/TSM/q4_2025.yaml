business:
  summary: >
    TSMC is the critical manufacturing substrate for advanced AI chips. It sells leading-edge wafer
    capacity and advanced packaging services that sit underneath NVIDIA, custom ASICs, and most of
    the broader accelerator roadmap.
  key_products:
    - "3nm and 5nm foundry capacity"
    - "advanced-node wafer starts"
    - "advanced packaging services"
    - "future N2 / N2-family capacity"

thesis_relevance:
  bottleneck_role: >
    Foundational logic bottleneck. If leading-edge wafer capacity is tight, the entire AI stack backs up.
    If TSMC overbuilds or demand softens, the shortage starts to break.
  why_now: >
    Q4 2025 showed continued strong leading-edge demand, 3nm already at 28% of wafer revenue,
    advanced nodes at 77%, and another strong guide into Q1 2026 alongside a $52B-$56B capex plan.
  confirms_next:
    - "Q1 2026 lands near the $34.6B-$35.8B guide with margins staying above 63%."
    - "2026 USD revenue growth remains close to 30%."
    - "Advanced-node mix keeps rising rather than flattening."
  break_conditions:
    - "Leading-edge demand cools enough to pull revenue/margins below guide."
    - "Massive capex results in faster-than-expected supply relief."
    - "AI customers digest inventory and node mix stops moving up."

