# Proposed thesis change: TSMC pricing power + CoWoS reclassification
# Status: pending | applied | rejected
# Target: cascade[CoWoS packaging], cascade[N3 logic wafers]

status: pending
created: "2026-04-13"
updated: "2026-04-13"

proposal: >
  Reclassify CoWoS from pure "played_out" to acknowledge that the constraint
  is still binding but the value now accrues through TSMC pricing power rather
  than equipment suppliers (ASX/AMAT). The trade is played out; the structural
  constraint is not. Add a pricing_power_signal to the CoWoS stage and enrich
  the N3 stage with TSMC under-exercised pricing data.

target_sections:
  - path: "cascade[CoWoS packaging]"
    add_field: "pricing_power_signal"
    value: >
      CoWoS is still the most supply-constrained node (113% demand CAGR, zero
      alternatives at scale, fully booked through 2026). The equipment trade
      (ASX/AMAT) is played out, but the constraint now manifests as TSMC pricing
      power. Every AI accelerator globally (NVIDIA, Google, Amazon, AMD, Broadcom
      ASIC) routes through TSMC advanced packaging. TSMC's packaging pricing power
      is structural and under-exercised.
  - path: "cascade[N3 logic wafers].signals"
    add: >
      TSMC captures $877-922 per H100 (3-4% of $25-30K ASP). Historical
      anchoring from $1K gaming GPUs. 30% price increase = $260-280/unit,
      <1% of GPU revenue. Repricing runway is years long. Gross margins
      guided 63-65% early 2026, 5-10% annual sub-5nm hikes announced.

evidence:
  - source: "sources/jstwng-nvidia-margin-illusion"
    date: "2026-04-12"
    signal: >
      Wang ranks CoWoS as #1 in substitutability ranking (most constrained,
      least substitutable). CoWoS capacity ~75K wafers/month early 2026,
      targeting 130K by late 2026, but demand at 113% CAGR keeps it fully
      booked. TSMC at ~25x fwd P/E is a discount to S&P 500 IT (~32x)
      despite 92% sub-5nm share and packaging monopoly.

  # Future evidence slots:
  # - TSMC Q1 2026 earnings (2026-04-17): pricing commentary, CoWoS mix, margin guide
  # - TSMC Q2 2026 earnings: confirm annual pricing trajectory
  # - CoWoS capacity utilization data (SemiAnalysis)

promote_when: >
  Apply after TSMC Q1 2026 earnings (2026-04-17) confirm pricing trajectory
  and CoWoS commentary. This is 4 days away.
