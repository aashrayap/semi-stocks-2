# Proposed thesis change: HBM long-term contracting reduces cyclical discount
# Status: pending | applied | rejected
# Target: cascade[Memory supercycle].signals, cascade[Memory supercycle].cycle_risk_flags

status: pending
created: "2026-04-13"
updated: "2026-04-13"

proposal: >
  Add a structural signal to the Memory supercycle stage: the shift from spot
  pricing to long-term contracted HBM supply (18-24 month forward commitments)
  may compress the cyclical volatility that historically defined memory.
  Analogous to LNG market restructuring in the 2010s — if it holds, the 5-8x
  fwd P/E on memory companies embeds a cyclical discount the business may no
  longer warrant. This is a thesis-level question, not a settled conclusion.

target_sections:
  - path: "cascade[Memory supercycle].signals"
    add: >
      HBM contracting shifting from spot to 18-24 month forward commitments.
      NVIDIA $53B memory purchase commitments. 3-player oligopoly (95%+ share)
      with non-cancellable contracts dampens spot volatility that historically
      enabled buyers to play suppliers against each other.
  - path: "cascade[Memory supercycle].cycle_risk_flags"
    add: >
      Counter-signal to LNG re-rating thesis: Baker's framework says every
      shortage → glut regardless of contract structure. All 3 vendors expanding
      simultaneously. Watch whether long-term contracts actually prevent the
      inventory cycle or merely delay it.

evidence:
  - source: "sources/jstwng-nvidia-margin-illusion"
    date: "2026-04-12"
    signal: >
      Wang draws LNG market parallel: when buyers shifted from spot to 15-20yr
      take-or-pay contracts, price volatility compressed and suppliers re-rated
      from cyclical to quasi-utility (Cheniere, Shell, TotalEnergies). HBM
      contracting trending same direction. If analogy holds, 5-8x fwd P/E
      on memory embeds unwarranted cyclical discount. SK Hynix 68.8% GM,
      Micron 74.9% GM — approaching/exceeding TSMC for first time in history.

  # Future evidence slots:
  # - MU earnings (2026-06-25): contract structure commentary, forward commitment data
  # - SK Hynix earnings: HBM contract terms, pricing power evidence
  # - Baker 13F Q1 2026: MU position size + put hedge ratio changes

promote_when: >
  This is the hardest call in the stack. Needs at least 2 more quarters of
  evidence that long-term contracts actually hold through a demand softening.
  Earliest promote: after MU Q3 FY2026 earnings (Sep 2026).
