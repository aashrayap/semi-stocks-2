  - path: "cascade[N3 logic wafers].signals"
    add: "TSMC captures only $877-922 per H100 (3-4% of ASP) — structural repricing runway of years"
  - path: "cascade[N3 logic wafers].cycle_risk_flags"
    add: "NVDA GAAP gross margin compressed 75.0% → 71.1% (FY2025 → FY2026) — bilateral monopoly vise"

