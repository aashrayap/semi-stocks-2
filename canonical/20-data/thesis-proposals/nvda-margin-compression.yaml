    signal: >
      Wang's margin-as-residual framework. NVIDIA captures 75%+ of GPU ASP
      while contributing ~14% of BoM. Margin absorbs pressure from TSMC
      (5-10% annual hikes), HBM oligopoly (20%+ price increases), and
