# Proposed thesis change: NVDA structural margin compression
# Status: pending | applied | rejected
# Target: cascade[N3 logic wafers].signals, cascade[Memory supercycle].signals, ticker_map.NVDA

status: pending
created: "2026-04-13"
updated: "2026-04-13"

proposal: >
  Add NVDA margin compression as a tracked signal across the N3 and Memory
  cascade stages. NVIDIA's gross margin is a structural residual that absorbs
  bilateral pressure from suppliers (TSMC pricing hikes, HBM price increases)
  and customers (hyperscaler custom silicon as credible BATNA). This is not
  cyclical — it operates even while demand is growing.

